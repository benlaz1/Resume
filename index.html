function useReveal() {
  const ref = useRef(null); const [shown, setShown] = useState(false);
  useEffect(() => { const el = ref.current; if (!el) return;
    const obs = new IntersectionObserver((es) => es.forEach((e) => { if (e.isIntersecting) { setShown(true); obs.unobserve(e.target); } }), { threshold: 0.12 });
    obs.observe(el); return () => obs.disconnect(); }, []);
  return [ref, shown];
}

function makeGear(THREE) {
  const teeth=16,rO=1.0,rI=0.82,rB=0.30,d=0.42; const sh=new THREE.Shape(); const st=(Math.PI*2)/(teeth*2);

  sh.closePath(); const h=new THREE.Path(); h.absarc(0,0,rB,0,Math.PI*2,true); sh.holes.push(h);
  const g=new THREE.ExtrudeGeometry(sh,{depth:d,bevelEnabled:true,bevelThickness:0.04,bevelSize:0.04,bevelSegments:2,steps:1}); g.center(); return g;
}

  const ote=(e)=>{if(startX.current==null)return;const dx=e.changedTouches[0].clientX-startX.current;if(dx>40)go(-1);else if(dx<-40)go(1);startX.current=null;};
  const cur=items[i];
  return (<div><div className="relative aspect-video w-full overflow-hidden rounded-xl border border-slate-700 bg-black" onTouchStart={ots} onTouchEnd={ote}>{items.map((it,idx)=>(<div key={idx} className={"absolute inset-0 transition-opacity duration-300 " + (idx===i?"opacity-100":"pointer-events-none opacity-0")}><MediaItem item={it} onOpen={onOpen} /></div>))}{n>1 && (<React.Fragment><button onClick={()=>go(-1)} aria-label="Previous" className="absolute left-2 top-1/2 -translate-y-1/2 rounded-full bg-slate-950/70 px-3 py-2 text-white backdrop-blur transition hover:bg-cyan-500 hover:text-slate-950">‹</button><button onClick={()=>go(1)} aria-label="Next" className="absolute right-2 top-1/2 -translate-y-1/2 rounded-full bg-slate-950/70 px-3 py-2 text-white backdrop-blur transition hover:bg-cyan-500 hover:text-slate-950">›</button><span className="absolute right-3 top-3 rounded-full bg-slate-950/70 px-2 py-0.5 text-xs text-slate-200 backdrop-blur">{(i+1)+" / "+n}</span></React.Fragment>)}{cur.type==="image" && (<span className="pointer-events-none absolute bottom-3 left-3 rounded-full bg-slate-950/70 px-2 py-0.5 text-[11px] text-slate-200 backdrop-blur">⤢ click to enlarge</span>)}{cur.type==="bundle" && (<span className="pointer-events-none absolute bottom-3 left-3 rounded-full bg-slate-950/70 px-2 py-0.5 text-[11px] text-slate-200 backdrop-blur">click any tile to open</span>)}</div>{n>1 && (<div className="mt-3 flex justify-center gap-2">{items.map((_,idx)=>(<button key={idx} onClick={()=>setI(idx)} aria-label={"Go to item "+(idx+1)} className={"h-2 rounded-full transition-all " + (idx===i?"w-6 bg-cyan-400":"w-2 bg-slate-600 hover:bg-slate-400")} />))}</div>)}</div>);
}

function Lightbox({ item, onClose }) {
  useEffect(()=>{const k=(e)=>{if(e.key==="Escape")onClose();};window.addEventListener("keydown",k);return ()=>window.removeEventListener("keydown",k);},[onClose]);
  if (!item) return null;
  return (<div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/90 p-4 backdrop-blur" onClick={onClose}><button onClick={onClose} aria-label="Close" className="absolute right-5 top-5 rounded-full border border-slate-600 bg-slate-900/80 px-4 py-2 text-slate-200 hover:border-cyan-400 hover:text-cyan-400">✕</button><div className="max-h-full max-w-5xl" onClick={(e)=>e.stopPropagation()}>{item.type==="image"?<img src={item.src} alt={item.caption||"Full size"} className="max-h-[85vh] w-auto rounded-lg" />:<video src={item.src} controls autoPlay className="max-h-[85vh] w-auto rounded-lg" />}{item.caption && <p className="mt-3 text-center text-sm text-slate-400">{item.caption}</p>}</div></div>);
}

function HeroBox({ item, onOpen }) {
  if (!item) return null;
  return (<button type="button" onClick={()=>onOpen(item)} title="Click to open" className="hero-fade group relative block aspect-video w-full cursor-zoom-in overflow-hidden rounded-xl border border-cyan-400/50 bg-slate-900 shadow-[0_0_28px_rgba(34,211,238,0.30)]">{item.type==="video"?<video src={item.src} className="h-full w-full object-cover" autoPlay muted loop playsInline />:<img src={item.src} alt={item.title||"Featured"} className="h-full w-full bg-black object-contain" />}{item.title && (<div className="pointer-events-none absolute inset-x-0 bottom-0 bg-gradient-to-t from-black/80 to-transparent px-3 py-1.5 text-left"><span className="text-xs font-semibold text-white">{item.title}</span></div>)}<span className="pointer-events-none absolute right-2 top-2 rounded-full bg-slate-950/70 px-2 py-0.5 text-[10px] text-cyan-200 opacity-0 backdrop-blur transition-opacity group-hover:opacity-100">⤢ open</span></button>);
}
function HeroShowcase({ pool, onOpen }) {
  const [i, setI] = useState(0);
  useEffect(()=>{if(!pool.length)return;const t=setInterval(()=>setI((p)=>(p+1)%pool.length),5000);return ()=>clearInterval(t);},[pool.length]);
  if (!pool.length) return null; const n=pool.length;
  return (<div className="flex w-full flex-col gap-4"><HeroBox key={"a"+(i%n)} item={pool[i%n]} onOpen={onOpen} /><HeroBox key={"b"+((i+1)%n)} item={pool[(i+1)%n]} onOpen={onOpen} /></div>);
}

function App() {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  useEffect(()=>{const o=()=>setScrolled(window.scrollY>20);window.addEventListener("scroll",o);return ()=>window.removeEventListener("scroll",o);},[]);
  const go=(id)=>{setMenuOpen(false);const el=document.getElementById(id);if(el)el.scrollIntoView({behavior:"smooth"});};
  return (
    <div className="min-h-screen bg-slate-950 font-sans text-slate-300 antialiased selection:bg-cyan-500/30">
      <div className="pointer-events-none fixed inset-0 overflow-hidden"><div className="absolute -top-40 left-1/4 h-96 w-96 rounded-full bg-cyan-600/20 blur-3xl" /><div className="absolute top-1/2 -right-20 h-96 w-96 rounded-full bg-indigo-600/20 blur-3xl" /></div>
      <header className={"fixed inset-x-0 top-0 z-50 transition-all duration-300 " + (scrolled ? "border-b border-slate-800 bg-slate-950/80 backdrop-blur" : "")}>
        <div className="mx-auto flex max-w-5xl items-center justify-between px-6 py-4"><button onClick={()=>go("top")} className="font-mono text-sm font-bold tracking-tight text-white"><span className="text-cyan-400">{"<"}</span>BL<span className="text-cyan-400">{" />"}</span></button><nav className="hidden gap-7 md:flex">{NAV.map(([l,id])=>(<button key={id} onClick={()=>go(id)} className="text-sm text-slate-400 transition-colors hover:text-cyan-400">{l}</button>))}</nav><button onClick={()=>setMenuOpen((v)=>!v)} className="rounded-md border border-slate-700 px-3 py-1.5 text-xs text-slate-300 md:hidden">Menu</button></div>
        {menuOpen && (<div className="border-t border-slate-800 bg-slate-950/95 px-6 py-3 md:hidden">{NAV.map(([l,id])=>(<button key={id} onClick={()=>go(id)} className="block w-full py-2 text-left text-sm text-slate-300 hover:text-cyan-400">{l}</button>))}</div>)}
      </header>
      <main id="top" className="relative">
        <section className="mx-auto flex min-h-screen max-w-5xl items-center px-6 pt-24">
          <div className="flex w-full flex-col gap-10 lg:flex-row lg:items-center lg:justify-between">
            <div className="w-full lg:max-w-2xl">
              <p className="mb-4 font-mono text-sm uppercase tracking-[0.3em] text-cyan-400">{PROFILE.location}</p>
              <h1 className="text-4xl font-extrabold leading-tight text-white sm:text-6xl">{PROFILE.name}</h1>
              <p className="mt-4 max-w-2xl text-lg font-medium text-slate-300 sm:text-xl">{PROFILE.tagline}</p>
              <p className="mt-6 max-w-2xl text-base leading-relaxed text-slate-400">{PROFILE.blurb}</p>
              <div className="mt-7 flex items-center gap-4">
                <img src={RECF_LOGO} alt="REC Foundation" className="h-20 w-20 shrink-0 rounded-lg bg-white object-contain p-1" />
                <div className="flex flex-col gap-3">{RECF.map((c)=>(<div key={c.label} className="flex items-center gap-3"><span className="rounded-full border border-cyan-500/40 bg-cyan-500/10 px-3 py-1 text-xs font-medium text-cyan-300">✓ {c.label}</span><button type="button" onClick={()=>setLightbox({type:"image",src:c.img,caption:c.label})} title="Click to enlarge certificate" className="h-11 w-16 shrink-0 cursor-zoom-in overflow-hidden rounded border border-slate-600 bg-white transition hover:ring-2 hover:ring-cyan-400"><img src={c.img} alt={c.label} className="h-full w-full object-contain opacity-70 transition hover:opacity-100" /></button></div>))}</div>
              </div>
              <div className="mt-7 flex flex-wrap gap-3"><button onClick={()=>go("projects")} className="rounded-lg bg-cyan-500 px-6 py-3 text-sm font-semibold text-slate-950 transition-colors hover:bg-cyan-400">View Projects</button><a href={PROFILE.linkedin} target="_blank" rel="noreferrer" className="rounded-lg border border-slate-700 px-6 py-3 text-sm font-semibold text-slate-200 transition-colors hover:border-cyan-400 hover:text-cyan-400">LinkedIn</a><a href={"mailto:"+PROFILE.email} className="rounded-lg border border-slate-700 px-6 py-3 text-sm font-semibold text-slate-200 transition-colors hover:border-cyan-400 hover:text-cyan-400">Email Me</a></div>
            </div>
            <div className="w-full shrink-0 lg:w-72"><HeroShowcase pool={HERO_POOL} onOpen={setLightbox} /></div>
          </div>
        </section>

        <Section id="about" kicker="01, Profile" title="About"><p className="max-w-3xl text-lg leading-relaxed text-slate-300">I build products that bridge mechanical design, electronics, and software. As Co-Team Captain of my school's Engineering Club, I led projects from concept through CAD, circuitry, and working prototypes, earning a research grant from NYIT and finalist placements at CIJE Innovation Day and CIJE Tank. I'm now on a gap year with Torah Tech, looking to contribute to an engineering team in Tel Aviv.</p></Section>

        <Section id="projects" kicker="02, Built & Shipped" title="Featured Projects">
          <div className="space-y-12">{PROJECTS.map((p)=>(<div key={p.title} className="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/50 p-7"><div className="mb-6"><Carousel items={MEDIA[p.title]||[]} onOpen={setLightbox} /></div><div className="flex items-center gap-3"><h3 className="text-2xl font-bold text-white">{p.title}</h3><span className="font-mono text-sm text-slate-500">{p.year}</span></div><p className="mt-1 inline-block rounded-md bg-cyan-500/10 px-2 py-0.5 text-xs font-medium text-cyan-300">{p.badge}</p><div className="mt-3 flex flex-wrap gap-2">{p.domains.map((d)=>(<span key={d} className="rounded border border-slate-700 px-2 py-0.5 text-[11px] uppercase tracking-wide text-slate-400">{d}</span>))}</div><p className="mt-4 max-w-3xl text-sm leading-relaxed text-slate-300">{p.summary}</p><ul className="mt-4 space-y-2">{p.points.map((pt,idx)=>{const hot=p.highlightFirst&&idx===0;return (<li key={pt} className={"flex gap-2 text-sm "+(hot?"rounded-lg bg-cyan-500/10 px-3 py-2 text-cyan-100 ring-1 ring-cyan-500/30":"text-slate-400")}><span className="mt-0.5 text-cyan-400">{hot?"★":"▹"}</span><span className={hot?"font-semibold":""}>{pt}</span></li>);})}</ul></div>))}</div>
          <p className="mt-6 text-center text-xs text-slate-600">Swipe or use the arrows to browse each project's videos and images. Click any image to view it full size.</p>
        </Section>

        <Section id="skills" kicker="03, Toolkit" title="Skills"><div className="grid gap-5 sm:grid-cols-2">{SKILLS.map((s)=>(<div key={s.group} className="rounded-xl border border-slate-800 bg-slate-900/50 p-6 transition-colors hover:border-cyan-500/40"><h3 className="mb-4 font-semibold text-white">{s.group}</h3><div className="flex flex-wrap gap-2">{s.items.map((it)=>{const lg=skillLogo(it);return (<span key={it} className="inline-flex items-center gap-1.5 rounded-md border border-slate-700 bg-slate-800/60 px-3 py-1 text-xs text-slate-300">{lg && <img src={lg.primary} data-fallback={lg.fallback||""} alt="" aria-hidden="true" loading="lazy" className="h-3.5 w-3.5 shrink-0" onError={(e)=>logoFallback(e.currentTarget)} onLoad={(e)=>{if(e.currentTarget.naturalWidth===0)logoFallback(e.currentTarget);}} />}{it}</span>);})}</div></div>))}</div></Section>

        <Section id="experience" kicker="04, Track Record" title="Experience & Leadership"><div className="relative space-y-8 border-l border-slate-800 pl-8">{EXPERIENCE.map((e)=>(<div key={e.role} className="relative"><span className="absolute -left-[37px] top-1.5 h-3 w-3 rounded-full border-2 border-cyan-400 bg-slate-950" /><div className="flex flex-wrap items-baseline justify-between gap-x-4"><h3 className="text-lg font-semibold text-white">{e.role}</h3><span className="font-mono text-xs text-slate-500">{e.date}</span></div><p className="text-sm text-cyan-400">{e.org}</p><ul className="mt-2 space-y-1.5">{e.points.map((pt)=>(<li key={pt} className="flex gap-2 text-sm text-slate-400"><span className="mt-1 text-slate-600"></span><span>{pt}</span></li>))}</ul></div>))}</div></Section>

        <Section id="education" kicker="05, Foundations" title="Education & Awards"><div className="grid gap-8 md:grid-cols-2"><div><div className="rounded-xl border border-slate-800 bg-slate-900/50 p-6"><h3 className="text-lg font-semibold text-white">Posnack School</h3><p className="text-sm text-slate-400">Davie, FL · Pre-Engineering Track</p><p className="mt-1 text-sm text-slate-400">Graduating June 2026 · GPA 4.47 · ACT 32</p></div><h4 className="mb-3 mt-7 text-sm font-mono uppercase tracking-widest text-cyan-400">AP Coursework</h4><div className="overflow-hidden rounded-xl border border-slate-800">{AP_SCORES.map(([name,score],i)=>(<div key={name} className={"flex items-center justify-between px-4 py-2 text-sm "+(i%2?"bg-slate-900/30":"bg-slate-900/60")}><span className="text-slate-300">{name}</span><span className="font-mono text-cyan-400">{score}</span></div>))}</div></div><div><h4 className="mb-3 text-sm font-mono uppercase tracking-widest text-cyan-400">Awards & Certifications</h4><ul className="space-y-2.5">{AWARDS.map((a)=>(<li key={a} className="flex gap-3 rounded-lg border border-slate-800 bg-slate-900/40 px-4 py-3 text-sm text-slate-300"><span className="text-cyan-400">★</span><span>{a}</span></li>))}</ul><p className="mb-2 mt-5 text-xs font-mono uppercase tracking-widest text-slate-500">Verify online</p><div className="flex flex-wrap gap-2"><a href="https://thecije.org/innovation-day-awards-2025/#1749146122415-cb3d53f2-4f39:~:text=PupPal%20%28Posnack%29" target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 rounded-lg border border-slate-700 px-3 py-2 text-xs font-medium text-slate-300 transition-colors hover:border-cyan-400 hover:text-cyan-400">CIJE Innovation Day 2025 ↗</a><a href="https://thecije.org/cijetank/#:~:text=Comprehensive%20Business%20Plan%20and%20Research%20Award" target="_blank" rel="noreferrer" className="inline-flex items-center gap-1 rounded-lg border border-slate-700 px-3 py-2 text-xs font-medium text-slate-300 transition-colors hover:border-cyan-400 hover:text-cyan-400">CIJE Tank 2025 ↗</a></div></div></div></Section>

        <Section id="contact" kicker="06, Let's Talk" title="Get In Touch"><div className="rounded-2xl border border-slate-800 bg-gradient-to-br from-slate-900 to-slate-900/30 p-8 sm:p-12"><p className="max-w-2xl text-lg text-slate-300">I'm looking for an engineering internship in Tel Aviv. If you're building something in mechanical, electrical, or AI/software, I'd love to talk.</p><div className="mt-8 flex flex-wrap gap-3"><a href={"mailto:"+PROFILE.email} className="rounded-lg bg-cyan-500 px-6 py-3 text-sm font-semibold text-slate-950 transition-colors hover:bg-cyan-400">{PROFILE.email}</a><a href={PROFILE.linkedin} target="_blank" rel="noreferrer" className="rounded-lg border border-slate-700 px-6 py-3 text-sm font-semibold text-slate-200 transition-colors hover:border-cyan-400 hover:text-cyan-400">LinkedIn</a><a href={"tel:"+PROFILE.phoneTel} className="rounded-lg border border-slate-700 px-6 py-3 text-sm font-semibold text-slate-200 transition-colors hover:border-cyan-400 hover:text-cyan-400">{PROFILE.phone}</a></div></div></Section>

        <div className="mx-auto max-w-5xl px-6 pb-12"><p className="mb-4 text-center text-xs font-mono uppercase tracking-[0.3em] text-slate-600">Academic Stats</p><div className="grid grid-cols-3 gap-3">{[["4.47","Cumulative GPA"],["32","ACT Score"],["2 × 5","AP Computer Science"]].map(([n,label])=>(<div key={label} className="rounded-xl border border-slate-800/70 bg-slate-900/30 p-4 text-center"><p className="text-xl font-bold text-slate-300 sm:text-2xl">{n}</p><p className="mt-1 text-xs text-slate-500">{label}</p></div>))}</div></div>

        <footer className="border-t border-slate-900 py-8 text-center text-xs text-slate-600">© {new Date().getFullYear()} {PROFILE.name} · Built with React</footer>
      </main>
      <Lightbox item={lightbox} onClose={()=>setLightbox(null)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
